<!DOCTYPE html>
<html lang="en">

<head>

<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<title>CampusKart | Product Details</title>

<link rel="stylesheet" href="style.css">

<link rel="stylesheet"
href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.2/css/all.min.css">

</head>

<body>

<header>

<nav class="navbar">

<div class="logo">

<i class="fa-solid fa-graduation-cap"></i>

<span>CampusKart</span>

</div>

<div class="search-box">

    <input
        type="text"
        placeholder="Search..."
    >

    <button>

        <i class="fa-solid fa-search"></i>

    </button>

</div>

<ul class="nav-links">

    <li><a href="index.html">Home</a></li>

    <li><a href="my-listings.html">My Listings</a></li>

</ul> 

</nav>

</header>
<section class="product-details">

    <div class="product-image">

        <img
            id="productImage"
            src="https://via.placeholder.com/500x350"
            alt="Product Image"
        >

    </div>

    <div class="product-info">

        <h1 id="title">Loading...</h1>

        <h2 id="price"></h2>

        <p class="product-meta">
            <strong>Category:</strong>
            <span id="category"></span>
        </p>

        <p class="product-meta">
            <strong>Condition:</strong>
            <span id="condition"></span>
        </p>

        <p id="description"></p>

        <div class="seller-box">

            <h2>
                <i class="fa-solid fa-user"></i>
                Seller Information
            </h2>

            <p>

                <strong>Name :</strong>

                <span id="sellerName"></span>

            </p>

            <p>

                <strong>Phone :</strong>

                <span id="sellerPhone"></span>

            </p>

            <p>

                <strong>Address :</strong>

                <span id="sellerAddress"></span>

            </p>

            <button id="whatsappBtn">

                <i class="fab fa-whatsapp"></i>

                Chat on WhatsApp

            </button>

        </div>

    </div>

</section> 
<footer>

    <div class="footer-container">

        <div>

            <h3>CampusKart</h3>

            <p>Buy & Sell Within Your Campus</p>

        </div>

    </div>

    <p class="copyright">

        © 2026 CampusKart

    </p>

</footer> 
<script src="https://cdn.jsdelivr.net/npm/sweetalert2@11"></script> 
<script src="product.js"></script>

</body>

</html>
