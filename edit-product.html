<!DOCTYPE html>
<html lang="en">

<head>

<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<title>Edit Product | CampusKart</title>

<link rel="stylesheet" href="style.css">

</head>

<body>

<header>

<nav class="navbar">

<div class="logo">

🎓 <span>CampusKart</span>

</div>

<div class="nav-links">

<a href="index.html">Home</a>

<a href="my-listings.html">My Listings</a>

</div>

</nav>

</header>

<section class="edit-page">

<h1>Edit Product</h1>

<form id="editForm" class="edit-form">

<div class="image-section">

<img
id="preview"
src=""
alt="Preview">

<input
type="file"
id="image">

</div>

<div class="form-section">

<input
type="text"
id="title"
placeholder="Title"
required>

<textarea
id="description"
placeholder="Description"
required></textarea>

<input
type="number"
id="price"
placeholder="Price"
required>

<select id="category">

<option>Books</option>

<option>Electronics</option>

<option>Cycles</option>

<option>Furniture</option>

<option>Others</option>

</select>

<select id="condition">

<option>New</option>

<option>Like New</option>

<option>Good</option>

<option>Used</option>

</select>

<button type="submit">

Update Product

</button>

</div>

</form>

</section>
<script src="https://cdn.jsdelivr.net/npm/sweetalert2@11"></script> 
<script src="protect.js"></script> 
<script src="navbar.js"></script> 
<script src="edit-product.js"></script>

</body>

</html>
