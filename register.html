<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Register | CampusKart</title>

<link rel="stylesheet" href="cards.css">

<style>

body{
    background:#f5f7fb;
    font-family:Poppins,sans-serif;
}

.form-box{
    width:420px;
    margin:60px auto;
    background:white;
    padding:35px;
    border-radius:15px;
    box-shadow:0 10px 25px rgba(0,0,0,.1);
}

.form-box h2{
    text-align:center;
    margin-bottom:25px;
}

input{
    width:100%;
    padding:12px;
    margin:10px 0;
    border:1px solid #ddd;
    border-radius:8px;
    font-size:16px;
}

button{
    width:100%;
    padding:14px;
    border:none;
    background:#2563eb;
    color:white;
    border-radius:8px;
    cursor:pointer;
    font-size:17px;
}

button:hover{
    background:#1d4ed8;
}

p{
    text-align:center;
}

a{
    color:#2563eb;
}

</style>

</head>

<body>

<div class="form-box">

<h2>Create Account</h2>

<form id="registerForm">

<input
type="text"
id="name"
placeholder="Full Name"
required>

<input
type="email"
id="email"
placeholder="Email"
required>

<input
type="password"
id="password"
placeholder="Password"
required>

<input
type="text"
id="phone"
placeholder="Phone">

<input
type="text"
id="address"
placeholder="Address">

<button type="submit">
Register
</button>

</form>

<p>
Already have an account?

<a href="login.html">
Login
</a>

</p>

</div>
<script src="https://cdn.jsdelivr.net/npm/sweetalert2@11"></script> 
<script src="register.js"></script>

</body>
</html>
