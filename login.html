<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Login | CampusKart</title>

<link rel="stylesheet" href="cards.css">

<style>

body{
    background:#f5f7fb;
    font-family:Poppins,sans-serif;
}

.form-box{
    width:420px;
    margin:70px auto;
    background:white;
    padding:35px;
    border-radius:15px;
    box-shadow:0 10px 25px rgba(0,0,0,.1);
}

input{
    width:100%;
    padding:12px;
    margin:12px 0;
    border:1px solid #ddd;
    border-radius:8px;
    font-size:16px;
}

button{
    width:100%;
    padding:14px;
    background:#2563eb;
    color:white;
    border:none;
    border-radius:8px;
    cursor:pointer;
    font-size:17px;
}

button:hover{
    background:#1d4ed8;
}

h2{
    text-align:center;
    margin-bottom:25px;
}

</style>

</head>

<body>

<div class="form-box">

<h2>Login</h2>

<form id="loginForm">

<input
type="email"
id="email"
placeholder="Email"
required>

<input
type="password"
id="password"
placeholder="Password"
required>

<button>
Login
</button>

</form>

</div>
<script src="https://cdn.jsdelivr.net/npm/sweetalert2@11"></script> 

<script src="login.js"></script>

</body>
</html>
