<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Sell Product | CampusKart</title>

    <link rel="stylesheet" href="style.css">

    <style>

        body{
            background:#f5f7fb;
            font-family:Arial,Helvetica,sans-serif;
        }

        .sell-container{

            max-width:700px;

            margin:50px auto;

            background:white;

            padding:35px;

            border-radius:15px;

            box-shadow:0 10px 25px rgba(0,0,0,.1);

        }

        .sell-container h1{

            text-align:center;

            color:#2563eb;

            margin-bottom:30px;

        }

        .form-group{

            margin-bottom:20px;

        }

        label{

            display:block;

            margin-bottom:8px;

            font-weight:bold;

        }

        input,
        textarea,
        select{

            width:100%;

            padding:12px;

            border:1px solid #ccc;

            border-radius:8px;

            font-size:16px;

            box-sizing:border-box;

        }

        textarea{

            resize:none;

            height:120px;

        }

        button{

            width:100%;

            padding:15px;

            background:#2563eb;

            color:white;

            border:none;

            border-radius:10px;

            cursor:pointer;

            font-size:18px;

            transition:.3s;

        }

        button:hover{

            background:#1d4ed8;

        }

    </style>

</head>
<body>

<div class="sell-container">

<h1>Sell Your Product</h1>

<form id="sellForm" enctype="multipart/form-data">

<div class="form-group">

<label>Product Image</label>

<input
type="file" 
id="image" 
name="image"
accept="image/*"
required
> 
<img 
id="preview"
style="width:250px;
margin-top:15px;
display:none;
border-radius:10px;"> 

</div>

<div class="form-group">

<label>Product Title</label>

<input
type="text"
name="title"
required
>

</div>

<div class="form-group">

<label>Description</label>

<textarea
name="description"
required
></textarea>

</div>

<div class="form-group">

<label>Price</label>

<input
type="number"
name="price"
required
>

</div>

<div class="form-group">

<label>Category</label>

<select name="category">

<option>Electronics</option>

<option>Books</option>

<option>Notes</option>

<option>Furniture</option>

<option>Others</option>

</select>

</div>

<div class="form-group">

<label>Condition</label>

<select name="condition">

<option>New</option>

<option>Like New</option>

<option>Good</option>

<option>Fair</option>

</select>

</div>


<button type="submit"> 

Sell Product

</button>

</form>

</div>
<script src="https://cdn.jsdelivr.net/npm/sweetalert2@11"></script> 
<script type="module" src="protect.js"></script> 

<script type="module" src="sell.js"></script>

</body>
</html>
